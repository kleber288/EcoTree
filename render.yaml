services:
  - type: web
    name: ecotree-backend
    runtime: python
    rootDir: EcoTree-backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    autoDeployTrigger: commit
    envVars:
      - key: ECOTREE_SECRET_KEY
        sync: false
      - key: ECOTREE_ENV
        value: production
      - key: ECOTREE_ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: ECOTREE_DATABASE_FILE
        value: ecotree.db
      - key: ECOTREE_FRONTEND_ORIGINS
        value: http://127.0.0.1:5173,http://localhost:5173,http://127.0.0.1:4173,http://localhost:4173
