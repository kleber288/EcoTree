services:
  - type: web
    name: ecotree-backend
    runtime: python
    rootDir: EcoTree-backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    autoDeployTrigger: commit
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: ECOTREE_SECRET_KEY
        sync: false
      - key: ECOTREE_ENV
        value: production
      - key: ECOTREE_ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: ECOTREE_DATABASE_FILE
        value: ecotree.db
      - key: ECOTREE_CORS_ORIGINS
        value: https://eco-tree-ten.vercel.app
